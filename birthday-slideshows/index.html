<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Birthday Slideshow</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; }\n        #gallery img { width: 200px; margin: 10px; }\n        #countdown { font-size: 24px; margin: 20px; }\n        #drum { cursor: pointer; margin: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Happy Birthday!</h1>\n    <div id="countdown"></div>\n    <div id="gallery">\n        <img src="photo1.jpg" alt="Birthday Photo 1">\n        <img src="photo2.jpg" alt="Birthday Photo 2">\n        <img src="photo3.jpg" alt="Birthday Photo 3">\n    </div>\n    <audio controls autoplay loop>\n        <source src="background-music.mp3" type="audio/mpeg">\n        Your browser does not support the audio element.\n    </audio>\n    <div id="drum">\n        <h2>Click me to play a drum!</h2>\n        <audio id="drum-sound" src="drum-sound.mp3"></audio>\n    </div>\n    <div id="celebration" style="display:none;">\n        <h2>🎉 Congratulations! 🎉</h2>\n        <p>Thanks for joining the celebration!</p>\n    </div>\n    <script>\n        // Countdown script\n        const birthdayDate = new Date("2026-03-22T00:00:00").getTime();\n        const countdownElement = document.getElementById('countdown');\n\n        const countdown = setInterval(() => {\n            const now = new Date().getTime();\n            const distance = birthdayDate - now;\n\n            const days = Math.floor(distance / (1000 * 60 * 60 * 24));\n            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));\n            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));\n            const seconds = Math.floor((distance % (1000 * 60)) / 1000);\n\n            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;\n\n            if (distance < 0) {\n                clearInterval(countdown);\n                countdownElement.innerHTML = "Happy Birthday!";\n                document.getElementById('celebration').style.display = 'block';\n            }\n        }, 1000);\n\n        // Drum game\n        document.getElementById('drum').onclick = function() {\n            document.getElementById('drum-sound').play();\n        };\n    </script>\n</body>\n</html>
